name: ParkTimer
options:
  bundleIdPrefix: com.parktimer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26"
  minimumXcodeGenVersion: "2.38"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: JVZFL2WCHV
    CODE_SIGN_STYLE: Automatic

targets:
  ParkTimer:
    type: application
    platform: iOS
    sources:
      - path: ParkTimer
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.parktimer.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "ParkTimer"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "ParkTimer saves your car location so you can find it later and calculates walking time for smart alerts."
        INFOPLIST_KEY_NSCameraUsageDescription: "ParkTimer lets you take a photo of your parking spot to help you find your car."
    dependencies:
      - target: ParkTimerWidgetExtension

  ParkTimerWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ParkTimerWidgetExtension
      - path: ParkTimer/LiveActivity/ParkingActivityAttributes.swift
      - path: ParkTimer/Models/ParkingState.swift
    info:
      path: ParkTimerWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: "ParkTimer Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.parktimer.app.widget
    entitlements:
      path: ParkTimerWidgetExtension/ParkTimerWidgetExtension.entitlements
      properties: {}
